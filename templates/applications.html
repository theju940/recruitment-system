<!DOCTYPE html>
<html>
<head>
    <title>Applications</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="navbar">
    <h2>HireHub</h2>
</div>

{% for app in apps %}
<div class="job-card">
    <h3>{{ app[2] }}</h3>
    <p>{{ app[3] }}</p>
    <p>{{ app[4] }}</p>
    <p>{{ app[5] }}</p>
    <p>Status: {{ app[7] }}</p>
</div>
{% endfor %}

</body>
</html>
